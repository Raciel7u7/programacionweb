<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio13.js" defer></script>
</head>
<body>
    <div id="contenedor-calculadora">
        <h1>¿Puedo Votar?</h1>
        <form id="calculadora">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" required placeholder="Ej. 25" step="1" min="0">

            <button type="submit" id="convertir">Verificar</button>

            <label for="resultado">Resultado:</label>
            <input type="text" id="resultado" name="resultado" readonly placeholder="Resultado">
        </form>
    </div>
</body>
</html>
