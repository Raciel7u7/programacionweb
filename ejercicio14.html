<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio14.js" defer></script>
</head>
<body>
    <div id="contenedor-calculadora">
        <h1>Operaciones sobre números</h1>
        <p>Calculadora que realiza operaciones sobre números ingresados</p>
        <form id="calculadora">
            <label for="numeros">Números separados por comas:</label>
            <input type="text" id="numeros" name="numeros" required placeholder="Ej. 25, 30, 35">

            <button type="submit" id="convertir">Verificar</button>

            <label for="resultado">Número mayor:</label>
            <input type="text" id="resultado1" name="resultado" readonly placeholder="Resultado">

            <label for="resultado">Número menor:</label>
            <input type="text" id="resultado2" name="resultado" readonly placeholder="Resultado">

            <label for="resultado">Promedio:</label>
            <input type="text" id="resultado3" name="resultado" readonly placeholder="Resultado">
        </form>
    </div>
</body>
</html>
