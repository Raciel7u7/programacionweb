<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio17.js" defer></script>
</head>
<body>

    <div id="contenedor-calculadora">
        <h1>Ejercicio 17</h1>
        <p>Gestión de Tareas</p>

        <form id="calculadora" onsubmit="event.preventDefault();">
            <label for="nueva-tarea">Tarea Pendiente:</label>
            <input type="text" id="nueva-tarea" placeholder="Ej. Estudiar JavaScript">

            <div id="botones-operacion">
                <button type="button" id="btn-agregar">Agregar Tarea</button>
            </div>

            <label style="margin-top: 15px; display: block;">Lista de Tareas:</label>
            <div id="lista-tareas" style="margin-top: 10px;"></div>
        </form>
    </div>
</body>
</html>
