<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio11.js" defer></script>
</head>
<body>
    <div id="contenedor-calculadora">
        <h1>Calculadora: Kilometros a Millas</h1>
        <form id="calculadora">
            <label for="kilometros">Kilometros:</label>
            <input type="number" id="kilometros" name="kilometros" required placeholder="Ej. 25" step="0.00001" min="0">

            <button type="submit" id="convertir">Convertir</button>

            <label for="resultado">Millas:</label>
            <input type="text" id="resultado" name="resultado" readonly placeholder="Resultado">
        </form>
    </div>
</body>
</html>
