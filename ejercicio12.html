<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 12</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio12.js" defer></script>
</head>
<body>
    <div id="contenedor-calculadora">
        <h1>Calculadora: Pesos Mexicanos (MXN) a Dólares (USD)</h1>
        <form id="calculadora">
            <label for="pesos">Pesos Mexicanos (MXN):</label>
            <input type="number" id="pesos" name="pesos" required placeholder="Ej. 25" step="0.01" min="0">

            <button type="submit" id="convertir">Convertir</button>

            <label for="resultado">Dólares (USD):</label>
            <input type="text" id="resultado" name="resultado" readonly placeholder="Resultado">
        </form>
    </div>
</body>
</html>
