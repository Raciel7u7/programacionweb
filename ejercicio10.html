<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio10.js" defer></script>
</head>
<body>
    <div id="contenedor-calculadora">
        <h1>Calculadora: Celsius a Fahrenheit</h1>
        <form id="calculadora">
            <label for="celsius">Celsius:</label>
            <input type="number" id="celsius" name="celsius" required placeholder="Ej. 25" step="0.01">

            <button type="submit" id="convertir">Convertir</button>

            <label for="resultado">Fahrenheit:</label>
            <input type="text" id="resultado" name="resultado" readonly placeholder="Resultado">
        </form>
    </div>
</body>
</html>
